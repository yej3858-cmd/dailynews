name: Daily Korean News Briefing

on:
  schedule:
    # 09:00 KST = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch and build briefing
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          python scripts/fetch_naver_news.py
          python scripts/score_cluster.py
          python scripts/build_html.py

      - name: Commit and push HTML updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html archive/*.html
          if git diff --cached --quiet; then
            echo "No HTML updates to commit."
            exit 0
          fi
          git commit -m "chore: update daily Korean news briefing"
          git push
